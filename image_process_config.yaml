# ── Data ──────────────────────────────────────────────────────────────────────
data:
  csv_path: data/processed/anilist_anime_multimodal_input_v1.csv
  image_columns:
    - coverImage_medium
    - bannerImage
  fetch_ratio: 0.5            # 抓取比例，1.0 = 全量；debug 時可調低
  split:
    train: 0.8
    val:   0.1
    test:  0.1
  image_size: 224             # resize 目標尺寸（swin-base 標準輸入）

# ── Debug ─────────────────────────────────────────────────────────────────────
debug:
  enabled: false
  sample_size: 100            # enabled=true 時只取前 n 筆

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  name: microsoft/swin-base-patch4-window7-224
  pretrained: true

# ── Augmentation ──────────────────────────────────────────────────────────────
augmentation:
  random_resized_crop:
    scale: [0.8, 1.0]         # 保留原圖面積比例（最多裁去 20% 面積）
    ratio: [0.85, 1.18]       # 裁切區塊的長寬比範圍（貼近正方形，避免過度拉伸）
    p: 1.0

  random_crop:
    max_crop_ratio: 0.1       # 每側最多裁去的比例（0.1 = 每邊最多裁 10%）
    p: 0.3                    # 低機率，作為輕度裁切的補充

  color_jitter:
    brightness: 0.4
    contrast:   0.4
    saturation: 0.4
    hue:        0.1
    p: 0.8                    # 套用機率

  gaussian_blur:
    kernel_size: 3
    sigma: [0.1, 2.0]
    p: 0.5                    # 套用機率（不是每次都模糊）

  random_horizontal_flip:
    p: 0.5                    # 套用機率

  random_grayscale:
    p: 0.2                    # 偶爾轉灰階，增加多樣性

# ── Training ──────────────────────────────────────────────────────────────────
training:
  batch_size: 64
  epochs: 50
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  device: cuda                # cuda / cpu
  tau: 0.07                   # InfoNCE temperature
  val_interval: 1             # 每幾個 epoch 跑一次 validation
  checkpoint_interval: 5      # 每幾個 epoch 存一次 checkpoint

# ── Output ────────────────────────────────────────────────────────────────────
output:
  results_dir: results          # 根目錄，子路徑由程式碼以 run_id 組合
  run_id: "01"                  # 每次微調遞增，對應 results/{run_id}/
  embedding_path: data/processed/image_embeddings.parquet
