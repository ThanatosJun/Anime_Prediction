embedding:
  model_name: sentence-transformers/all-MiniLM-L6-v2
  model_version: sentence-transformers==3.0.1
  embedding_dim: 384
  device: auto
  batch_size: 16
  experiments:
    active_model_key: minilm_l6
    models:
      minilm_l6:
        model_name: sentence-transformers/all-MiniLM-L6-v2
        batch_size: 32
      bge_small:
        model_name: BAAI/bge-small-en-v1.5
        batch_size: 24
      e5_small:
        model_name: intfloat/e5-small-v2
        batch_size: 24
      bge_base:
        model_name: BAAI/bge-base-en-v1.5
        batch_size: 16
      e5_base:
        model_name: intfloat/e5-base-v2
        batch_size: 16
      multilingual_minilm:
        model_name: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
        batch_size: 16
preprocessing:
  lowercase: true
  remove_urls: true
  remove_marketing: true
  remove_extra_whitespace: true
  min_length: 10
  max_length: 512
splits:
  train: train
  val: val
  test: test
  holdout_unknown: holdout_unknown
targets:
- popularity
- meanScore
text_fields:
  primary: description
  secondary:
  - title_romaji
  - title_english
random_seed: 42
output:
  format: parquet
  artifact_dir: artifacts
  report_dir: reports
