# ── Data ──────────────────────────────────────────────────────────────────────
data:
  # fusion_meta_dir:   data/fussion
  fusion_meta_dir:   data/fussion
  text_emb_dir:      src/fussion_branch/embedding/text
  rag_features_dir:  src/fussion_branch/RAG/return
  image_emb_dir:     src/fussion_branch/embedding/image   # zeros if missing
  meta_encoder_path: .exp/fussion/meta_encoder.json
  # meta_encoder_path: .exp/fussion/meta_encoder_post2000.json


# ── Model ─────────────────────────────────────────────────────────────────────
model:
  # per-modality projection dims → fused 256 (after modality gate)
  text_proj:   128   # 384  → 128
  image_proj:   64   # 1024 → 64
  meta_proj:    64   # 66   → 64
  # backbone hidden dims after fusion (fused_dim = 128+64+64 = 256)
  hidden_dims: [256, 128, 64]
  dropout:     0.4
  # GNN (applied before FusionMLP; text 384-dim & image 1024-dim)
  gnn_num_layers: 2      # Run12=1 → 2，更強的鄰居聚合
  gnn_dropout:    0.2    # Run12=0.1 → 0.2，防早期過擬

# ── Training ──────────────────────────────────────────────────────────────────
training:
  batch_size:               256
  epochs:                   150
  learning_rate:            3.0e-4     # Run12=5e-4 → 3e-4，整體稍降
  gnn_lr_factor:            0.3        # GNN LR = base_lr × 0.3 = 9e-5（從隨機初始化，需更慢收斂）
  weight_decay:             1.0e-3
  warmup_epochs:            10         # Run12=5 → 10，給 GNN 更多暖身時間
  early_stopping_patience:  25         # Run12=20 → 25
  grad_clip:                1.0
  mixed_precision:          true       # FP16 autocast + GradScaler (RTX GPU)
  device:                   cuda

# ── Targets ───────────────────────────────────────────────────────────────────
# active_targets controls which targets are trained when --target is not given
active_targets: ["popularity", "meanScore"]   # change to ["popularity"] or ["meanScore"] to train only one

targets:
  popularity:
    log_transform:  true
    winsor_pct:     99      # cap training target at this percentile (log1p space), null = disabled
  meanScore:
    log_transform:  false
    winsor_pct:     null

# ── Output ────────────────────────────────────────────────────────────────────
output:
  results_dir: .exp/fussion/results
  run_id:      "13"
  notes:       "GNN 超參調整：gnn_num_layers=2, gnn_dropout=0.2, gnn_lr_factor=0.3（GNN LR=9e-5），warmup=10, patience=25"
