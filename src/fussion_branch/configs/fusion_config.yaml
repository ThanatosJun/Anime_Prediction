# ── Data ──────────────────────────────────────────────────────────────────────
data:
  # fusion_meta_dir:   data/fussion
  fusion_meta_dir:   data/fussion/post2000
  text_emb_dir:      src/fussion_branch/embedding/text
  rag_features_dir:  src/fussion_branch/RAG/return
  image_emb_dir:     src/fussion_branch/embedding/image   # zeros if missing
  # meta_encoder_path: .exp/fussion/meta_encoder.json
  meta_encoder_path: .exp/fussion/meta_encoder_post2000.json

  top_studios:       50
  top_voice_actors:  50

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  # per-modality projection dims (text→128, image→256, meta→128 → fused 512)
  text_proj:   128
  image_proj:  256
  meta_proj:   128
  # backbone hidden dims after fusion
  hidden_dims: [512, 256, 128]
  dropout:     0.4

# ── Training ──────────────────────────────────────────────────────────────────
training:
  batch_size:               256
  epochs:                   150
  learning_rate:            5.0e-4
  weight_decay:             1.0e-3
  warmup_epochs:            5          # linear LR ramp before ReduceLROnPlateau
  early_stopping_patience:  20
  grad_clip:                1.0
  mixed_precision:          true       # FP16 autocast + GradScaler (RTX GPU)
  device:                   cuda

# ── Targets ───────────────────────────────────────────────────────────────────
# active_targets controls which targets are trained when --target is not given
active_targets: ["popularity", "meanScore"]   # change to ["popularity"] or ["meanScore"] to train only one

targets:
  popularity:
    log_transform: true
  meanScore:
    log_transform: false

# ── Output ────────────────────────────────────────────────────────────────────
output:
  results_dir: .exp/fussion/results
  run_id:      "03"
  notes:       "對齊 fussion model 在 embedding 和 RAG features 的訓練資料"
