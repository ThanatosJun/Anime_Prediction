qdrant:
  collection_name: "anime_rag"
  host: "localhost"
  port: 6333

paths:
  meta_dir:      "data/fussion"
  encoder_path:  "src/fussion_branch/RAG/sparse_encoder.json"
  train_csv:     "data/fussion/fusion_meta_clean_train.csv"
  text_emb_dir:  "src/fussion_branch/embedding/text"
  image_emb_dir: "src/fussion_branch/embedding/image"
  out_dir:       "src/fussion_branch/RAG/return"

embedding:
  text_emb_dim:  384
  image_emb_dim: 1024

indexing:
  batch_size: 256

query:
  top_k:      1   # top-1 payload → MetaEncoder scalar features
  top_k_ids:  5   # top-K IDs stored for GNN (text + image embedding lookup at training time)
  prefetch_k: 50
