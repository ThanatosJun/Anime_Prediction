# Text Embedding Configuration
# Version: 0.1.0

# Model Settings
embedding:
  model_name: "sentence-transformers/all-MiniLM-L6-v2"  # Sentence-Transformer model
  model_version: "sentence-transformers==3.0.1"
  embedding_dim: 384
  device: "auto"  # auto -> cuda if available, else cpu
  batch_size: 16

# Text Preprocessing
preprocessing:
  lowercase: true
  remove_urls: true
  remove_extra_whitespace: true
  min_length: 10  # minimum characters
  max_length: 512  # maximum characters for truncation

# Splits
splits:
  train: "train"
  val: "val"
  test: "test"
  holdout_unknown: "holdout_unknown"

# Target Columns
targets:
  - "popularity"
  - "meanScore"

# Text Fields
text_fields:
  primary: "description"
  secondary:
    - "title_romaji"
    - "title_english"

# Random Seed (for reproducibility)
random_seed: 42

# Output Settings
output:
  format: "parquet"
  artifact_dir: "artifacts"
  report_dir: "reports"

# Paths
paths:
  meta_dir: "data/fussion"
  out_dir:  "src/fussion_branch/embedding/text"
