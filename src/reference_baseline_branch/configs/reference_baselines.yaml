# Reference baseline runner config.
#
# These experiments are external comparison points for the paper baseline
# matrix. They intentionally live outside src/fussion_branch so RQ ablations and
# literature baselines do not get mixed together.

data:
  meta_dir: data/fussion/post2000
  text_emb_dir: src/fussion_branch/embedding/text
  image_emb_dir: src/fussion_branch/embedding/image
  splits: ["train", "val", "test"]
  id_col: id

output:
  results_dir: .exp/baseline/results
  run_id: "01"
  notes: "Foundation baselines plus Armenta-style fusion scaffold"

targets:
  popularity:
    log_transform: true
  meanScore:
    log_transform: false

features:
  metadata:
    numeric:
      - release_year
      - episodes
      - duration
      - startDate_day
      - prequel_count
      - prequel_meanScore_mean
    log_numeric:
      - prequel_popularity_mean
    cyclic:
      release_quarter: 4
      startDate_month: 12
    categorical:
      - format
      - source
      - countryOfOrigin
    boolean:
      - isAdult
      - is_sequel
      - has_sequel
    multihot:
      genres:
        parser: literal_list
        top_k: null
      studios:
        parser: anilist_studios_json
        top_k: 50
      voice_actor_names:
        parser: pipe
        top_k: 50
  text_embedding:
    file_template: text_embeddings_{split}.parquet
    prefix: emb_
  image_embedding:
    file_template: image_embeddings_{split}.parquet

feature_sets:
  none:
    metadata: false
    text_embedding: false
    image_embedding: false
  metadata:
    metadata: true
    text_embedding: false
    image_embedding: false
  text_embedding:
    metadata: false
    text_embedding: true
    image_embedding: false
  image_embedding:
    metadata: false
    text_embedding: false
    image_embedding: true
  text_image:
    metadata: false
    text_embedding: true
    image_embedding: true
  metadata_text_image:
    metadata: true
    text_embedding: true
    image_embedding: true

baselines:
  - id: F0-Mean
    enabled: true
    feature_set: none
    model: mean
    reference: common baseline
    reproduction_level: common
    paper_supported_component: "Common lowest-reference predictor; no specific paper reproduction claimed."
    project_adaptation_component: "Predict train-set target mean for every validation/test sample."
    claim_allowed: "Used as a lowest-reference baseline."
    claim_not_allowed: "Do not cite this as reproducing any paper."

  - id: F0-Ridge-Meta
    enabled: true
    feature_set: metadata
    model: ridge
    params:
      alpha: 1.0
    reference: common baseline
    reproduction_level: common
    paper_supported_component: "Common linear baseline; no specific paper reproduction claimed."
    project_adaptation_component: "Ridge regression on AniList pre-release metadata using project temporal split."
    claim_allowed: "Used as a simple linear metadata baseline."
    claim_not_allowed: "Do not cite this as reproducing Lo & Syu 2023 or another paper."

  - id: F1-RF-Meta
    enabled: true
    feature_set: metadata
    model: random_forest
    params:
      n_estimators: 300
      max_depth: null
      min_samples_leaf: 2
      random_state: 42
      # Keep single-worker by default: some Windows sandbox sessions deny
      # joblib worker pipe creation.
      n_jobs: 1
    reference: Lo & Syu 2023
    reproduction_level: adapted
    paper_supported_component: "Lo & Syu 2023 supports pre-broadcast entertainment metadata with classical ML and includes Random Forest."
    project_adaptation_component: "Anime-domain regression on popularity/meanScore with AniList pre-release metadata and temporal split."
    claim_allowed: "Metadata-only Random Forest baseline adapted from Lo & Syu 2023."
    claim_not_allowed: "Do not claim exact reproduction; the original task is Japanese TV drama high/low rating classification with cross-validation."

  - id: F1-GB-Meta
    enabled: true
    feature_set: metadata
    model: gradient_boosting
    params:
      n_estimators: 300
      max_depth: 3
      learning_rate: 0.05
      random_state: 42
    reference: Lo & Syu 2023 + gradient boosting adaptation
    reproduction_level: adapted
    paper_supported_component: "Lo & Syu 2023 supports the metadata-only classical ML route, but not Gradient Boosting specifically."
    project_adaptation_component: "Stronger sklearn Gradient Boosting tabular baseline on the same AniList metadata feature set."
    claim_allowed: "Gradient-boosting extension of the Lo & Syu 2023 metadata-only classical ML route."
    claim_not_allowed: "Do not claim this model appears in Lo & Syu 2023."

  - id: F2-XGB-Concat
    enabled: true
    feature_set: metadata_text_image
    model: xgboost
    params:
      n_estimators: 500
      max_depth: 4
      learning_rate: 0.03
      subsample: 0.9
      colsample_bytree: 0.9
      random_state: 42
      objective: reg:squarederror
    reference: Chen et al. 2019; Jeong et al. 2024
    reproduction_level: adapted
    paper_supported_component: "Chen et al. 2019 and Jeong et al. 2024 support visual/textual feature fusion with XGBoost-style classical regressors."
    project_adaptation_component: "AniList metadata + project text embeddings + project image embeddings concatenated for XGBoost regression."
    claim_allowed: "Feature-concat XGBoost baseline adapted from visual-textual popularity prediction literature."
    claim_not_allowed: "Do not claim same dataset, encoders, or exact feature extraction as the cited papers."

  - id: T2-XGB-TextEmb
    enabled: true
    feature_set: text_embedding
    model: xgboost
    params:
      n_estimators: 500
      max_depth: 4
      learning_rate: 0.03
      subsample: 0.9
      colsample_bytree: 0.9
      random_state: 42
      objective: reg:squarederror
    reference: Anime synopsis traditional classifiers + text embedding adaptation
    reproduction_level: adapted
    paper_supported_component: "Anime synopsis-only success prediction literature supports single-modality text baselines for anime-related prediction."
    project_adaptation_component: "Project text embeddings are used as pre-release synopsis/title representations and fed to XGBoost regression."
    claim_allowed: "Text-embedding-only baseline adapted from anime synopsis-only prediction literature."
    claim_not_allowed: "Do not claim exact reproduction of TF-IDF/classifier synopsis methods because this baseline uses project embeddings and regression targets."

  - id: I1-XGB-ImageEmb
    enabled: true
    feature_set: image_embedding
    model: xgboost
    params:
      n_estimators: 500
      max_depth: 4
      learning_rate: 0.03
      subsample: 0.9
      colsample_bytree: 0.9
      random_state: 42
      objective: reg:squarederror
    reference: Zhou, Zhang & Yi 2019
    reproduction_level: adapted
    paper_supported_component: "Poster/cover CNN feature literature supports using visual embeddings as predictive signals for entertainment performance."
    project_adaptation_component: "Project image embeddings from anime cover/banner assets are fed to XGBoost regression."
    claim_allowed: "Image-embedding-only baseline adapted from poster/cover visual-feature prediction literature."
    claim_not_allowed: "Do not claim exact reproduction of the poster CNN architecture or movie box-office setting."

  - id: C1-Armenta-MLP
    enabled: false
    feature_set: metadata_text_image
    model: mlp
    params:
      hidden_layer_sizes: [512, 256, 128]
      alpha: 0.001
      learning_rate_init: 0.0005
      max_iter: 300
      early_stopping: true
      random_state: 42
    reference: Armenta-Segura & Sidorov 2025
    reproduction_level: adapted
    paper_supported_component: "Armenta-Segura & Sidorov 2025 supports anime-domain multimodal popularity prediction using text/image branches and deep fusion."
    project_adaptation_component: "Project metadata + text embeddings + image embeddings with an sklearn MLP fusion head."
    claim_allowed: "Anime-domain deep fusion baseline adapted from Armenta-Segura & Sidorov 2025."
    claim_not_allowed: "Do not claim numerical comparability or exact reproduction; model branches, dataset, and target definitions differ."

  - id: C2-CTNN-Lite
    enabled: false
    feature_set: text_image
    model: cross_modal_transformer
    params:
      text_dim: 384
      image_dim: 1024
      d_model: 128
      nhead: 4
      num_layers: 2
      dim_feedforward: 256
      dropout: 0.1
      learning_rate: 0.001
      weight_decay: 0.0001
      batch_size: 256
      max_epochs: 80
      patience: 10
      validation_fraction: 0.15
      random_state: 42
      device: cpu
      torch_num_threads: 1
      verbose: false
    reference: Madongo, Tang & Hassan 2023
    reproduction_level: adapted
    paper_supported_component: "Madongo et al. 2023 supports poster/text cross-modal transformer fusion for entertainment outcome prediction."
    project_adaptation_component: "Project text and image embeddings are projected into modality tokens and fused with a lightweight TransformerEncoder regression head."
    claim_allowed: "Lightweight cross-modal transformer fusion baseline adapted from poster-text box-office prediction literature."
    claim_not_allowed: "Do not claim exact CTNN reproduction; this implementation uses precomputed project embeddings and a simplified two-token transformer fusion head."
